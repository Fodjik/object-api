<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Object details</title>
  <link rel="stylesheet" href="/theme.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</head>
<body>
  <div class="shell">
    <div class="card card-pad">
      <h1 class="page-title">Object details</h1>
      <p class="page-sub">Public view (from QR or link).</p>
      <div id="object-details"></div>
      <p id="error" class="error hidden"></p>
      <button type="button" class="btn btn-primary" style="margin-top:1rem" onclick="window.location.href='/'">Back to app</button>
    </div>
  </div>

  <script>
    async function loadObjectDetails() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const id = parts[parts.length - 1];
      const detailsDiv = document.getElementById('object-details');
      const errorElement = document.getElementById('error');

      try {
        const response = await axios.get(`/api/public/objects/${id}`);
        const obj = response.data;
        detailsDiv.innerHTML = `
          <dl style="margin:0;display:grid;gap:0.35rem 1rem;font-size:0.95rem">
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Name</dt>
            <dd style="margin:0;font-weight:600">${escapeHtml(obj.name)}</dd>
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Material</dt>
            <dd style="margin:0">${escapeHtml(obj.material_name || '—')}</dd>
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Material notes</dt>
            <dd style="margin:0">${escapeHtml(obj.material_description || '—')}</dd>
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Dimensions</dt>
            <dd style="margin:0">${obj.length} × ${obj.width} × ${obj.depth} cm</dd>
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Surface</dt>
            <dd style="margin:0">${escapeHtml(obj.surface)}</dd>
            <dt class="page-sub" style="margin:0;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em">Location</dt>
            <dd style="margin:0">${escapeHtml(obj.location_name || '—')}</dd>
          </dl>
        `;
      } catch (error) {
        console.error('Error fetching object:', error);
        errorElement.textContent =
          'Error: ' + (error.response?.data?.error || error.message);
        errorElement.classList.remove('hidden');
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    loadObjectDetails();
  </script>
</body>
</html>
