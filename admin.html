<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="/theme.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
</head>
<body>
  <div class="shell">
    <nav class="nav-bar" style="margin-bottom:1rem" aria-label="Admin nav">
      <span class="nav-brand">Admin</span>
      <a class="btn btn-ghost" href="/" style="text-decoration:none;display:inline-flex">← App</a>
      <a class="btn btn-ghost" href="/login" style="text-decoration:none;display:inline-flex">Login</a>
    </nav>

    <div class="card card-pad">
      <h1 class="page-title">Users</h1>
      <p class="page-sub">Approve signups and grant admin. Requires service role on the server and an admin account.</p>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>Email</th>
              <th>Approved</th>
              <th>Admin</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
      <p id="admin-error" class="error hidden"></p>
    </div>
  </div>

  <script type="module">
    const table = document.getElementById('users-table');
    const adminError = document.getElementById('admin-error');

    const cfgRes = await fetch('/api/config');
    if (!cfgRes.ok) {
      adminError.textContent = 'Cannot load /api/config.';
      adminError.classList.remove('hidden');
      throw new Error('config');
    }
    const cfg = await cfgRes.json();
    const { createClient } = await import(
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    );
    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        detectSessionInUrl: true,
        flowType: 'implicit',
        persistSession: true,
      },
    });

    const {
      data: { session },
    } = await supabase.auth.getSession();
    if (!session) {
      window.location.replace('/login');
    }

    axios.interceptors.request.use(async (config) => {
      const { data: { session: s } } = await supabase.auth.getSession();
      if (s?.access_token) {
        config.headers.Authorization = `Bearer ${s.access_token}`;
      }
      return config;
    });

    function showErr(msg) {
      adminError.textContent = msg;
      adminError.classList.remove('hidden');
    }

    async function renderUsers() {
      table.innerHTML = '<tr><td colspan="4">Loading…</td></tr>';
      adminError.classList.add('hidden');
      try {
        const response = await axios.get('/api/users');
        const users = response.data;
        table.innerHTML = '';
        users.forEach((user) => {
          const row = document.createElement('tr');
          const id = user.id;
          row.innerHTML = `
            <td>${escapeHtml(user.email || '')}</td>
            <td>${user.is_approved ? 'Yes' : 'No'}</td>
            <td>${user.is_admin ? 'Yes' : 'No'}</td>
            <td>
              <button type="button" class="action-btn" data-act="approve" data-id="${id}">${user.is_approved ? 'Approved' : 'Approve'}</button>
              <button type="button" class="action-btn" data-act="admin" data-id="${id}">${user.is_admin ? 'Admin' : 'Make admin'}</button>
              <button type="button" class="action-btn danger" data-act="del" data-id="${id}">Delete</button>
            </td>
          `;
          table.appendChild(row);
        });

        table.querySelectorAll('button[data-act]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const act = btn.getAttribute('data-act');
            const uid = btn.getAttribute('data-id');
            if (act === 'approve') approveUser(uid);
            else if (act === 'admin') makeAdmin(uid);
            else if (act === 'del') deleteUser(uid);
          });
        });
      } catch (error) {
        console.error(error);
        const msg =
          error.response?.data?.error ||
          error.message ||
          'Failed to load users.';
        showErr(msg);
        table.innerHTML = '';
        if (error.response?.status === 403) {
          showErr(
            'Forbidden: you are not an admin, or the server cannot list users (check SUPABASE_SERVICE_ROLE_KEY on Render).'
          );
        }
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    async function approveUser(id) {
      try {
        await axios.post(`/api/users/approve/${id}`);
        await renderUsers();
      } catch (e) {
        console.error(e);
        alert(e.response?.data?.error || e.message);
      }
    }

    async function makeAdmin(id) {
      try {
        await axios.post(`/api/users/make-admin/${id}`);
        await renderUsers();
      } catch (e) {
        console.error(e);
        alert(e.response?.data?.error || e.message);
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user from Supabase Auth and related data?')) return;
      try {
        await axios.delete(`/api/users/${id}`);
        await renderUsers();
      } catch (e) {
        console.error(e);
        alert(e.response?.data?.error || e.message);
      }
    }

    await renderUsers();
  </script>
</body>
</html>
