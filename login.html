<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <link rel="stylesheet" href="/theme.css" />
  <script src="/i18n.js"></script>
</head>
<body>
  <div class="shell">
    <div class="card card-pad center-card">
      <div style="display:flex;justify-content:flex-end;gap:0.35rem;margin-bottom:0.65rem">
        <button type="button" class="btn btn-ghost" data-lang-btn="en" id="lang-en" data-i18n="lang_en"></button>
        <button type="button" class="btn btn-ghost" data-lang-btn="fi" id="lang-fi" data-i18n="lang_fi"></button>
      </div>
      <h1 class="page-title" data-i18n="login_title"></h1>
      <p class="page-sub" data-i18n="login_sub"></p>
      <button type="button" class="btn btn-primary" id="btn-google" style="width:100%;margin-top:0.5rem" data-i18n="login_google"></button>
      <p id="err" class="error hidden"></p>

      <div style="margin-top:1.35rem;padding-top:1.25rem;border-top:1px solid var(--border)">
        <p class="page-sub" style="margin-bottom:0.5rem;font-weight:600;color:var(--text)" data-i18n="login_magic_title"></p>
        <label><span data-i18n="login_email"></span> <input type="email" id="ml-email" autocomplete="email" data-i18n-placeholder="login_email_ph" /></label>
        <button type="button" class="btn btn-ghost" id="btn-magic" style="width:100%;margin-top:0.65rem" data-i18n="login_send"></button>
        <p id="ml-ok" class="hidden" style="margin-top:0.65rem;font-size:0.9rem;color:var(--success)" data-i18n="login_sent"></p>
      </div>

      <p id="google-hint" class="page-sub" style="margin-top:1.1rem;font-size:0.82rem;line-height:1.45"></p>

      <p class="page-sub" style="margin-top:1.25rem;margin-bottom:0">
        <a href="/register" data-i18n="login_reg"></a>
        · <a href="/" data-i18n="login_home"></a>
      </p>
    </div>
  </div>
  <script type="module">
    const errEl = document.getElementById('err');

    function applyLoginLang(callbackUrl) {
      I18n.apply(document.body);
      I18n.updateLangButtons();
      document.title = I18n.t('doc_title_login');
      if (callbackUrl) {
        document.getElementById('google-hint').innerHTML = I18n.t('login_google_hint_html', {
          url: callbackUrl,
        });
      }
    }

    document.getElementById('lang-en').addEventListener('click', () => I18n.setLang('en'));
    document.getElementById('lang-fi').addEventListener('click', () => I18n.setLang('fi'));

    const cfgRes = await fetch('/api/config');
    if (!cfgRes.ok) {
      errEl.textContent = I18n.t('login_config_err');
      errEl.classList.remove('hidden');
      I18n.apply(document.body);
      I18n.updateLangButtons();
      document.title = I18n.t('doc_title_login');
      throw new Error('config');
    }
    const cfg = await cfgRes.json();
    const callbackUrl = `${cfg.supabaseUrl.replace(/\/$/, '')}/auth/v1/callback`;

    window.addEventListener('applangchange', () => applyLoginLang(callbackUrl));
    applyLoginLang(callbackUrl);

    const { createClient } = await import(
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    );
    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        detectSessionInUrl: true,
        flowType: 'pkce',
      },
    });

    function showOAuthReturnErrors() {
      const q = new URLSearchParams(window.location.search);
      let msg = q.get('error_description') || q.get('error');
      if (!msg && window.location.hash) {
        const hp = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        msg = hp.get('error_description') || hp.get('error');
      }
      if (msg) {
        errEl.textContent = decodeURIComponent(String(msg).replace(/\+/g, ' '));
        errEl.classList.remove('hidden');
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }
    showOAuthReturnErrors();

    const {
      data: { session },
    } = await supabase.auth.getSession();
    if (session) {
      window.location.replace('/');
    }

    supabase.auth.onAuthStateChange((event, sess) => {
      if (event === 'SIGNED_IN' && sess) {
        window.location.replace('/');
      }
    });

    document.getElementById('btn-google').onclick = async () => {
      errEl.classList.add('hidden');
      const redirectTo = `${window.location.origin}/login`;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo },
      });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      }
    };

    document.getElementById('btn-magic').onclick = async () => {
      const email = document.getElementById('ml-email').value.trim();
      const okEl = document.getElementById('ml-ok');
      okEl.classList.add('hidden');
      errEl.classList.add('hidden');
      if (!email) {
        errEl.textContent = I18n.t('login_email_empty');
        errEl.classList.remove('hidden');
        return;
      }
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: `${window.location.origin}/login` },
      });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      } else {
        okEl.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
