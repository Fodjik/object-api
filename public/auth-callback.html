<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in…</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body>
  <div class="shell">
    <div class="card card-pad center-card">
      <p class="page-title" style="font-size:1.1rem;margin:0">Signing you in…</p>
      <p id="msg" class="page-sub" style="margin-top:0.5rem;margin-bottom:0">Please wait.</p>
      <p id="err" class="error hidden" style="margin-top:0.75rem"></p>
      <p class="page-sub" style="margin-top:1rem"><a href="/login">Back to login</a></p>
    </div>
  </div>
  <script type="module">
    const msgEl = document.getElementById('msg');
    const errEl = document.getElementById('err');

    const cfgRes = await fetch('/api/config');
    if (!cfgRes.ok) {
      msgEl.textContent = '';
      errEl.textContent = 'Cannot load configuration.';
      errEl.classList.remove('hidden');
      throw new Error('config');
    }
    const cfg = await cfgRes.json();
    const { createClient } = await import(
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    );

    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        flowType: 'implicit',
        detectSessionInUrl: true,
        persistSession: true,
      },
    });

    async function waitForSession() {
      let { data: { session } } = await supabase.auth.getSession();
      if (session) return session;

      await new Promise((r) => setTimeout(r, 200));
      ({ data: { session } } = await supabase.auth.getSession());
      if (session) return session;

      return new Promise((resolve) => {
        let timeout;
        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          (_event, sess) => {
            if (sess) {
              clearTimeout(timeout);
              subscription.unsubscribe();
              resolve(sess);
            }
          }
        );
        timeout = setTimeout(() => {
          subscription.unsubscribe();
          resolve(null);
        }, 10000);
      });
    }

    const session = await waitForSession();

    if (session) {
      window.history.replaceState({}, '', '/auth/callback');
      window.location.replace('/');
    } else {
      msgEl.textContent = '';
      errEl.innerHTML =
        'No session from this link. <strong>Request a new sign-in email</strong> after updating the app (magic links now work on any device). If it keeps failing, confirm this URL is listed under Supabase → Authentication → URL configuration → Redirect URLs.';
      errEl.classList.remove('hidden');
    }
  </script>
</body>
</html>
