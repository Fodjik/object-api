<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in…</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body>
  <div class="shell">
    <div class="card card-pad center-card">
      <p class="page-title" style="font-size:1.1rem;margin:0">Signing you in…</p>
      <p id="msg" class="page-sub" style="margin-top:0.5rem;margin-bottom:0">Please wait.</p>
      <p id="err" class="error hidden" style="margin-top:0.75rem"></p>
      <p class="page-sub" style="margin-top:1rem"><a href="/login">Back to login</a></p>
    </div>
  </div>
  <script type="module">
    const msgEl = document.getElementById('msg');
    const errEl = document.getElementById('err');

    const cfgRes = await fetch('/api/config');
    if (!cfgRes.ok) {
      msgEl.textContent = '';
      errEl.textContent = 'Cannot load configuration.';
      errEl.classList.remove('hidden');
      throw new Error('config');
    }
    const cfg = await cfgRes.json();
    const { createClient } = await import(
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    );
    const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: { flowType: 'pkce', detectSessionInUrl: true },
    });

    const href = window.location.href;
    if (!href.includes('code=')) {
      msgEl.textContent = '';
      errEl.textContent = 'Missing sign-in code. Request a new link from the login page.';
      errEl.classList.remove('hidden');
    } else {
      const { error } = await supabase.auth.exchangeCodeForSession(href);
      if (error) {
        msgEl.textContent = '';
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
      } else {
        window.location.replace('/');
      }
    }
  </script>
</body>
</html>
